<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Backstage Worship Assessments</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --black: #000000;
            --white: #FFFFFF;
            --dark-gray: #1a1a1a;
            --light-gray: #f5f5f5;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            margin-bottom: 50px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 30px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.95rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        .auth-section {
            max-width: 500px;
            margin: 100px auto;
            background: var(--dark-gray);
            padding: 50px;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.2);
        }

        .auth-section h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--gold);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--white);
            font-size: 1rem;
            font-family: 'Work Sans', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .filter-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--white);
            font-size: 0.95rem;
            font-family: 'Work Sans', sans-serif;
        }

        .filter-group select:focus {
            outline: none;
            border-color: var(--gold);
        }

        .filter-group select option {
            background: var(--dark-gray);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--dark-gray);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.2);
        }

        .stat-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
        }

        .submissions-table {
            background: var(--dark-gray);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .table-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            font-weight: 600;
        }

        td {
            color: rgba(255, 255, 255, 0.8);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .checkbox-cell {
            width: 50px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .type-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .type-team {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
        }

        .type-leader {
            background: rgba(155, 89, 182, 0.2);
            color: #9b59b6;
        }

        .type-pastor {
            background: rgba(230, 126, 34, 0.2);
            color: #e67e22;
        }

        .btn {
            padding: 16px 40px;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Work Sans', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--black);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled:hover {
            background: transparent;
            color: var(--gold);
            box-shadow: none;
        }

        .btn.btn-primary:disabled:hover {
            background: var(--gold);
            color: var(--black);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gold);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .report-generation {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .report-generation.active {
            display: flex;
        }

        .report-container {
            background: var(--dark-gray);
            border-radius: 12px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            border: 2px solid var(--gold);
        }

        .report-container h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .report-content {
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
        }

        .report-section {
            margin-bottom: 30px;
        }

        .report-section h3 {
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .close-report {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--gold);
            font-size: 2rem;
            cursor: pointer;
            padding: 10px;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }

            table {
                font-size: 0.85rem;
            }

            th, td {
                padding: 15px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">BACKSTAGE WORSHIP</div>
            <div class="subtitle">Admin Dashboard</div>
        </header>

        <!-- Authentication -->
        <div class="auth-section" id="authSection">
            <h2>Admin Login</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">Login</button>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Submissions</div>
                    <div class="stat-value" id="totalSubmissions">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Organizations</div>
                    <div class="stat-value" id="totalOrganizations">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Selected</div>
                    <div class="stat-value" id="selectedCount">0</div>
                </div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>Organization</label>
                    <select id="orgFilter" onchange="filterSubmissions()">
                        <option value="">All Organizations</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Assessment Type</label>
                    <select id="typeFilter" onchange="filterSubmissions()">
                        <option value="">All Types</option>
                        <option value="team">Team Member</option>
                        <option value="leader">Worship Leader</option>
                        <option value="pastor">Pastor/Oversight</option>
                    </select>
                </div>
                <div class="filter-group">
                    <button class="btn" onclick="clearFilters()">Clear Filters</button>
                </div>
            </div>

            <div class="submissions-table">
                <div class="table-header">
                    <h3>Submissions</h3>
                    <button class="btn btn-primary" id="generateReportBtn" onclick="generateReport()" disabled>
                        Generate Report
                    </button>
                </div>
                <div id="tableContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading submissions...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Generation Modal -->
    <div class="report-generation" id="reportModal">
        <div class="report-container">
            <button class="close-report" onclick="closeReport()">×</button>
            <h2>AI-Generated Report</h2>
            <div id="reportContent" class="report-content">
                <div class="loading">
                    <div class="spinner"></div>
                    Analyzing responses and generating customized report...
                </div>
            </div>
            <div class="action-buttons" style="margin-top: 30px;">
                <button class="btn btn-primary" onclick="downloadReport()">Download as PDF</button>
                <button class="btn" onclick="closeReport()">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBbOgxE2GU-HHahxRnc4GTH_v_UyxL_uog",
  authDomain: "backstage-worship-assessment.firebaseapp.com",
  databaseURL: "https://backstage-worship-assessment-default-rtdb.firebaseio.com",
  projectId: "backstage-worship-assessment",
  storageBucket: "backstage-worship-assessment.firebasestorage.app",
  messagingSenderId: "189779521949",
  appId: "1:189779521949:web:b55b6619ed88600c6e7f74"
};

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let allSubmissions = [];
        let filteredSubmissions = [];
        let selectedSubmissions = new Set();

        const ADMIN_PASSWORD = "MeAndMyHouse1"; // Change this to your secure password

        window.login = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                loadSubmissions();
            } else {
                alert('Incorrect password');
            }
        };

        function loadSubmissions() {
            const assessmentsRef = ref(database, 'assessments');
            onValue(assessmentsRef, (snapshot) => {
                allSubmissions = [];
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach(key => {
                        allSubmissions.push({
                            id: key,
                            ...data[key]
                        });
                    });
                }
                
                updateStats();
                populateFilters();
                filterSubmissions();
            });
        }

        function updateStats() {
            document.getElementById('totalSubmissions').textContent = allSubmissions.length;
            
            const organizations = new Set(allSubmissions.map(s => s.userInfo.organization));
            document.getElementById('totalOrganizations').textContent = organizations.size;
        }

        function populateFilters() {
            const orgFilter = document.getElementById('orgFilter');
            const organizations = new Set(allSubmissions.map(s => s.userInfo.organization));
            
            orgFilter.innerHTML = '<option value="">All Organizations</option>';
            organizations.forEach(org => {
                const option = document.createElement('option');
                option.value = org;
                option.textContent = org;
                orgFilter.appendChild(option);
            });
        }

        window.filterSubmissions = function() {
            const orgFilter = document.getElementById('orgFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            
            filteredSubmissions = allSubmissions.filter(submission => {
                const matchesOrg = !orgFilter || submission.userInfo.organization === orgFilter;
                const matchesType = !typeFilter || submission.type === typeFilter;
                return matchesOrg && matchesType;
            });
            
            renderTable();
        };

        window.clearFilters = function() {
            document.getElementById('orgFilter').value = '';
            document.getElementById('typeFilter').value = '';
            filterSubmissions();
        };

        function renderTable() {
            const tableContent = document.getElementById('tableContent');
            
            if (filteredSubmissions.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No submissions found</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell">
                                <input type="checkbox" onchange="toggleAllCheckboxes(this.checked)">
                            </th>
                            <th>Name</th>
                            <th>Organization</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filteredSubmissions.forEach(submission => {
                const date = new Date(submission.timestamp).toLocaleDateString();
                const typeClass = `type-${submission.type}`;
                const typeName = {
                    team: 'Team',
                    leader: 'Leader',
                    pastor: 'Pastor'
                }[submission.type];
                
                html += `
                    <tr>
                        <td class="checkbox-cell">
                            <input type="checkbox" 
                                   onchange="toggleSubmission('${submission.id}', this.checked)"
                                   ${selectedSubmissions.has(submission.id) ? 'checked' : ''}>
                        </td>
                        <td>${submission.userInfo.name}</td>
                        <td>${submission.userInfo.organization}</td>
                        <td><span class="type-badge ${typeClass}">${typeName}</span></td>
                        <td>${date}</td>
                        <td>${submission.userInfo.role || '-'}</td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            tableContent.innerHTML = html;
        }

        window.toggleAllCheckboxes = function(checked) {
            if (checked) {
                filteredSubmissions.forEach(s => selectedSubmissions.add(s.id));
            } else {
                selectedSubmissions.clear();
            }
            updateSelectedCount();
            renderTable();
        };

        window.toggleSubmission = function(id, checked) {
            if (checked) {
                selectedSubmissions.add(id);
            } else {
                selectedSubmissions.delete(id);
            }
            updateSelectedCount();
        };

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = selectedSubmissions.size;
            document.getElementById('generateReportBtn').disabled = selectedSubmissions.size === 0;
        }

        window.generateReport = async function() {
            if (selectedSubmissions.size === 0) return;
            
            const selectedData = allSubmissions.filter(s => selectedSubmissions.has(s.id));
            
            document.getElementById('reportModal').classList.add('active');
            document.getElementById('reportContent').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Analyzing ${selectedData.length} submissions and generating customized report...
                </div>
            `;
            
            try {
                const report = await generateAIReport(selectedData);
                document.getElementById('reportContent').innerHTML = report;
            } catch (error) {
                console.error('Error generating report:', error);
                document.getElementById('reportContent').innerHTML = `
                    <p style="color: #e74c3c;">Error generating report. Please try again.</p>
                `;
            }
        };

        async function generateAIReport(submissions) {
            // Group by organization
            const orgName = submissions[0].userInfo.organization;
            
            // Calculate section averages
            const sectionScores = {};
            const typeBreakdown = { team: 0, leader: 0, pastor: 0 };
            
            submissions.forEach(submission => {
                typeBreakdown[submission.type]++;
                
                Object.values(submission.responses).forEach(response => {
                    if (!sectionScores[response.section]) {
                        sectionScores[response.section] = {
                            total: 0,
                            count: 0,
                            questions: {}
                        };
                    }
                    sectionScores[response.section].total += response.value;
                    sectionScores[response.section].count++;
                    
                    if (!sectionScores[response.section].questions[response.question]) {
                        sectionScores[response.section].questions[response.question] = [];
                    }
                    sectionScores[response.section].questions[response.question].push(response.value);
                });
            });
            
            // Calculate averages
            const sectionAverages = {};
            Object.keys(sectionScores).forEach(section => {
                sectionAverages[section] = {
                    average: (sectionScores[section].total / sectionScores[section].count).toFixed(2),
                    percentage: ((sectionScores[section].total / sectionScores[section].count / 5) * 100).toFixed(1)
                };
            });
            
            // Call Claude API to generate narrative report
            const prompt = `You are analyzing worship ministry health assessment data for ${orgName}. Generate a comprehensive, personalized report.

ASSESSMENT DATA:
- Total Respondents: ${submissions.length}
- Team Members: ${typeBreakdown.team}
- Worship Leaders: ${typeBreakdown.leader}
- Pastors/Oversight: ${typeBreakdown.pastor}

SECTION SCORES (out of 5):
${Object.entries(sectionAverages).map(([section, data]) => 
    `${section}: ${data.average} (${data.percentage}%)`
).join('\n')}

Generate a report with these sections:
1. Executive Summary (2-3 paragraphs)
2. Overall Health Score (interpret the data)
3. Key Strengths (areas scoring 80%+)
4. Areas for Growth (areas scoring below 70%)
5. Specific Recommendations (3-5 actionable items)
6. Next Steps

Make it pastoral, encouraging, honest, and actionable. Use the Backstage Worship voice - professional but warm.`;

            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-20250514",
                    max_tokens: 1000,
                    messages: [
                        { role: "user", content: prompt }
                    ],
                })
            });

            const data = await response.json();
            const reportText = data.content[0].text;
            
            // Format the report with HTML
            return `
                <div class="report-section">
                    <h3>Organization: ${orgName}</h3>
                    <p><strong>Assessment Date:</strong> ${new Date().toLocaleDateString()}</p>
                    <p><strong>Respondents:</strong> ${submissions.length} total (${typeBreakdown.team} team, ${typeBreakdown.leader} leaders, ${typeBreakdown.pastor} pastoral)</p>
                </div>
                
                <div class="report-section">
                    <h3>Section Scores Overview</h3>
                    ${Object.entries(sectionAverages).map(([section, data]) => `
                        <div style="margin: 15px 0;">
                            <strong>${section}:</strong> ${data.percentage}%
                            <div style="background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-top: 5px;">
                                <div style="background: ${getColorForScore(data.percentage)}; width: ${data.percentage}%; height: 100%; border-radius: 4px;"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="report-section">
                    ${reportText.split('\n\n').map(para => `<p>${para}</p>`).join('')}
                </div>
            `;
        }

        function getColorForScore(percentage) {
            if (percentage >= 80) return '#27ae60';
            if (percentage >= 70) return '#f39c12';
            return '#e74c3c';
        }

        window.closeReport = function() {
            document.getElementById('reportModal').classList.remove('active');
        };

        window.downloadReport = function() {
            const reportContent = document.getElementById('reportContent').innerHTML;
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>Backstage Worship Health Report</title>
                    <style>
                        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
                        h2, h3 { color: #D4AF37; }
                        .report-section { margin: 30px 0; }
                    </style>
                </head>
                <body>
                    <h1 style="color: #D4AF37;">Backstage Worship Health Report</h1>
                    ${reportContent}
                </body>
                </html>
            `;
            
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backstage-worship-report-${new Date().toISOString().split('T')[0]}.html`;
            a.click();
        };
    </script>
</body>
</html>
